model:
  # chatModelPath can also be changed at runtime with /model or /models chat
  chatModelPath: ./models/NemoMix-Unleashed-12B-Q4_K_M.gguf
  embeddingModelPath: ./models/embedding-model.gguf
  contextSize: 8192
  gpuLayers: -1
  threads: 8
  chatFormat: mistral-instruct

generation:
  temperature: 0.75
  topP: 0.95
  repeatPenalty: 1.1
  maxTokens: 700
  stop:
    - </s>
    - "User:"
    - "You:"

features:
  soul: true
  rag: false
  memory: true
  skills: false
  curator: false
  kanban: false
  agents: false
  streaming: true
  showSources: true
  tools: false

rag:
  dbPath: ./chromaDb
  docsPath: ./docs
  collectionName: localDocs
  topK: 5
  chunkSize: 1200
  chunkOverlap: 200
  pdfOcrEnabled: true
  pdfOcrLang: eng
  pdfMinTextChars: 32

memory:
  userFile: ./app/memory/user.md
  memoryFile: ./app/memory/memory.md
  sessionFile: ./app/memory/session.md
  updateEveryTurns: 10
  maxUserChars: 3000
  maxMemoryChars: 6000
  maxSessionChars: 4000

skills:
  activePath: ./app/skills/active
  archivedPath: ./app/skills/archived
  registryPath: ./app/skills/registry.json
  workflowLogPath: ./app/skills/workflow_log.json
  autoCreate: false
  minSuccessfulRepeats: 3
  successWindowTurns: 3

curator:
  staleDays: 30
  bloatMaxChars: 1000

tasks:
  kanbanPath: ./app/tasks/kanban.json

sessions:
  storePath: ./app/sessions
  maxSavedSessions: 50

agents:
  # Agent role/profile models can be changed at runtime with /models.
  # Example: /models role critic Llama-3.1-8B
  runsPath: ./app/agents/runs
  maxIterations: 3
  requireApproval: true
  strictJson: true
  residencyMode: hybrid
  defaultProfile: creator
  modelProfiles:
    orchestrator:
      chatModelPath:
      residency: swap
      temperature: 0.2
      maxTokens: 1400
    creator:
      chatModelPath:
      residency: resident
      temperature: 0.35
      maxTokens: 1800
    critic_executor:
      chatModelPath:
      residency: resident
      temperature: 0.1
      maxTokens: 1000
  roles:
    orchestrator:
      modelProfile: orchestrator
    researcher:
      modelProfile: critic_executor
      # allowedTools scopes a role to specific tools (empty = no restriction).
      allowedTools: [read_file, list_dir, search_docs]
    creator:
      modelProfile: creator
    executor:
      modelProfile: critic_executor
      allowedTools: [read_file, list_dir, run_command, write_file]
    critic:
      modelProfile: critic_executor
      allowedTools: [read_file, list_dir, search_docs]
    synthesizer:
      modelProfile: creator

logging:
  logPath: ./logs/soulforge.log
  level: info
  console: false

tools:
  allowWrite: false
  allowShell: false
  readRoots:
    - ./docs
    - ./app
  writeRoots:
    - ./app/memory
    - ./app/tasks
  maxReadBytes: 65536
  shellAllowlist: []
  # fetch_url is off by default. Enable and list allowed domains to use it.
  allowNetwork: false
  networkAllowlist: []
  # Example: networkAllowlist: [example.com, api.github.com]
  autoApproveReadOnly: true

onboarding:
  completed: false

# Local API server used by the desktop GUI (python -m app.server, runs in WSL).
# The GUI connects over localhost; WSL2 forwards it to the Windows host.
server:
  host: 127.0.0.1
  port: 8765
  # Optional shared secret. Set the same value in SOULFORGE_TOKEN on the GUI
  # side. Empty = no auth (fine for single-user localhost).
  authToken: ""

# Optional multimodal model for the GUI's screen-snapshot feature. Supply a
# vision GGUF plus its mmproj (CLIP projector). Empty modelPath = OCR fallback.
vision:
  modelPath: ""        # e.g. ./models/vision/llava-v1.6-mistral-7b.Q4_K_M.gguf
  mmprojPath: ""       # e.g. ./models/vision/mmproj-model-f16.gguf
  chatHandler: llava-1-5   # llava-1-5 | llava-1-6 | moondream | qwen2.5-vl
  contextSize: 4096
  maxTokens: 512
  # Free the chat model's VRAM before loading vision (it reloads afterwards).
  evictChat: false

# Speech-to-text for the GUI's push-to-talk hotkey (faster-whisper, WSL GPU).
transcription:
  modelSize: small     # tiny | base | small | medium | large-v3 | <path>
  device: cuda         # cuda | cpu
  computeType: float16 # float16 | int8_float16 | int8
  language: ""         # "" autodetects
