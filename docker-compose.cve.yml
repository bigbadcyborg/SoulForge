services:
  cve-fetcher:
    build:
      context: .
      dockerfile: Dockerfile.cve
    container_name: soulforge-cve-fetcher
    restart: unless-stopped
    environment:
      CVE_API_HOST: 127.0.0.1
      CVE_API_PORT: "8010"
      CVE_FETCH_HOURS: "24"
      CVE_FETCH_LIMIT: "50"
      CVE_FETCH_INTERVAL_SECONDS: "86400"
    volumes:
      - ./data:/app/data
